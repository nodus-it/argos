# Argos — production compose stack (self-host install)
#
# This file is downloaded into the install directory by `install.sh` and is
# considered SYSTEM-MANAGED — the installer overwrites it on update. To layer
# in your own customisation (extra ports, labels, volumes, env), drop a
# `docker-compose.override.yml` next to this file. Compose merges it
# automatically and the installer never touches it.
#
# All tunables live in `.env` (see .env.example for the full list with
# defaults). Keys are read by compose via `${VAR:-default}` substitution.

name: argos

# OAuth client credentials are read by both the app (Connect flow) and the
# queue worker (TokenRefresher during phase runs). Defined once here, merged
# into both services' environment via the YAML anchor below.
x-oauth-env: &oauth-env
  GITHUB_CLIENT_ID:        "${GITHUB_CLIENT_ID:-}"
  GITHUB_CLIENT_SECRET:    "${GITHUB_CLIENT_SECRET:-}"
  GITLAB_CLIENT_ID:        "${GITLAB_CLIENT_ID:-}"
  GITLAB_CLIENT_SECRET:    "${GITLAB_CLIENT_SECRET:-}"
  GITLAB_INSTANCE_URL:     "${GITLAB_INSTANCE_URL:-}"
  BITBUCKET_CLIENT_ID:     "${BITBUCKET_CLIENT_ID:-}"
  BITBUCKET_CLIENT_SECRET: "${BITBUCKET_CLIENT_SECRET:-}"

services:

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE:      "${ARGOS_DB_DATABASE}"
      MARIADB_USER:          "${ARGOS_DB_USERNAME}"
      MARIADB_PASSWORD:      "${ARGOS_DB_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${ARGOS_DB_ROOT_PASSWORD}"
    volumes:
      - argos-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - argos-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    image: "${ARGOS_APP_IMAGE}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Spawning worker containers needs the host's docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent app state (config, app-key).
      - argos-data:/data
      # Shared with nginx — entrypoint syncs /app/public + the baked
      # nginx.conf into these on every boot so nginx can serve assets and
      # site config without bind-mounts in the host install dir.
      - argos-public:/srv/argos-public
      - argos-nginx-config:/srv/argos-nginx
    environment:
      <<: *oauth-env
      ARGOS_ROLE:                        "app"
      APP_ENV:                           "${APP_ENV:-production}"
      APP_DEBUG:                         "${APP_DEBUG:-false}"
      APP_URL:                           "${APP_URL:-http://localhost:${ARGOS_PORT:-8080}}"
      APP_KEY:                           "${APP_KEY}"
      ADMIN_PASSWORD:                    "${ADMIN_PASSWORD:-}"
      CLAUDE_CODE_OAUTH_TOKEN:           "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_CONFIG_DIR:                  /data/config
      DB_CONNECTION:                     "mariadb"
      ARGOS_DB_HOST:                     "db"
      ARGOS_DB_PORT:                     "3306"
      ARGOS_DB_DATABASE:                 "${ARGOS_DB_DATABASE}"
      ARGOS_DB_USERNAME:                 "${ARGOS_DB_USERNAME}"
      ARGOS_DB_PASSWORD:                 "${ARGOS_DB_PASSWORD}"
      QUEUE_CONNECTION:                  "redis"
      REDIS_HOST:                        "redis"
      REDIS_PORT:                        "6379"
      ARGOS_QUEUE_DEFAULT_PROCESSES:     "${ARGOS_QUEUE_DEFAULT_PROCESSES:-5}"
      ARGOS_QUEUE_TASKS_PROCESSES:       "${ARGOS_QUEUE_TASKS_PROCESSES:-2}"
    healthcheck:
      # Goes green only when DB is reachable AND the schema is fully migrated,
      # so dependents (queue) can rely on `service_healthy`.
      test: ["CMD-SHELL", "php /app/artisan migrate:status >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${ARGOS_PORT:-8080}:80"
    volumes:
      # Both volumes are populated by the app container's entrypoint on every
      # boot. Mounted RO here so nginx can serve static assets directly without
      # bouncing through PHP-FPM, and pick up the baked site config.
      - argos-public:/app/public:ro
      - argos-nginx-config:/etc/nginx/conf.d:ro

  queue:
    image: "${ARGOS_APP_IMAGE}"
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 60s
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
    environment:
      <<: *oauth-env
      ARGOS_ROLE:                        "queue"
      APP_ENV:                           "${APP_ENV:-production}"
      APP_DEBUG:                         "${APP_DEBUG:-false}"
      APP_URL:                           "${APP_URL:-http://localhost:${ARGOS_PORT:-8080}}"
      APP_KEY:                           "${APP_KEY}"
      CLAUDE_CODE_OAUTH_TOKEN:           "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_CONFIG_DIR:                  /data/config
      DB_CONNECTION:                     "mariadb"
      ARGOS_DB_HOST:                     "db"
      ARGOS_DB_PORT:                     "3306"
      ARGOS_DB_DATABASE:                 "${ARGOS_DB_DATABASE}"
      ARGOS_DB_USERNAME:                 "${ARGOS_DB_USERNAME}"
      ARGOS_DB_PASSWORD:                 "${ARGOS_DB_PASSWORD}"
      QUEUE_CONNECTION:                  "redis"
      REDIS_HOST:                        "redis"
      REDIS_PORT:                        "6379"
      ARGOS_QUEUE_DEFAULT_PROCESSES:     "${ARGOS_QUEUE_DEFAULT_PROCESSES:-5}"
      ARGOS_QUEUE_TASKS_PROCESSES:       "${ARGOS_QUEUE_TASKS_PROCESSES:-2}"
    command: ["php", "/app/artisan", "horizon"]

volumes:
  argos-data:
  argos-db:
  argos-redis:
  argos-public:
  argos-nginx-config:
