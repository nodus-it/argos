# Argos — Docker Compose stack
#
# Services:
#   db            — MariaDB 11
#   app           — Laravel app (PHP-FPM), runs migrations on boot, spawns worker containers via the docker socket
#   nginx         — reverse proxy in front of app:9000
#   queue         — Laravel queue worker (same image as app, ARGOS_ROLE=queue)
#   worker-build  — auto-builds the argos-worker:local-php8.{3,4} images so the app spawn path always finds them
#
# Image source:
#   By default the `app`/`queue` services build `argos-app:local` from the local
#   sources. Set ARGOS_APP_IMAGE to a registry tag (e.g.
#   `ghcr.io/nodus-it/argos-app:stage`) and run `docker compose pull` to use a
#   prebuilt image instead.
#
# Profiles:
#   (no profile)  — db + app + nginx + queue + auto worker-build (test/dev default)
#   build-only    — manual rebuild of the worker images on demand
#
# To skip the auto worker-build (e.g. when ARGOS_WORKER_IMAGE points at a registry tag):
#   docker compose up --no-deps db app nginx queue
# To rebuild only the worker images:
#   docker compose --profile build-only build

name: argos

services:

  # Builds argos-worker:local-php8.{3,4} on every `docker compose up`.
  # Layer cache makes this near-instant when nothing in worker/ changed.
  # The app service waits for completion via depends_on, so the spawn path
  # always finds an up-to-date image.
  worker-build:
    image: docker:cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../..:/build:ro
    working_dir: /build
    command: >
      sh -c "set -e;
        docker build -t argos-worker:local-php8.4 -f .tools/docker/worker/Dockerfile --target worker-php84 .;
        docker build -t argos-worker:local-php8.3 -f .tools/docker/worker/Dockerfile --target worker ."
    restart: "no"

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE:      "${ARGOS_DB_DATABASE:-argos}"
      MARIADB_USER:          "${ARGOS_DB_USERNAME:-argos}"
      MARIADB_PASSWORD:      "${ARGOS_DB_PASSWORD:-argos}"
      MARIADB_ROOT_PASSWORD: "${ARGOS_DB_ROOT_PASSWORD:-argos-root}"
    volumes:
      - argos-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    # Default to the locally built image. Override ARGOS_APP_IMAGE to pull a
    # tagged registry build instead (e.g. `ghcr.io/nodus-it/argos-app:stage`)
    # — `docker compose pull` will fetch it; `docker compose build` would
    # rebuild from source and re-tag.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    build:
      context: ../..
      dockerfile: .tools/docker/app/Dockerfile
      target: app
    depends_on:
      db:
        condition: service_healthy
      worker-build:
        condition: service_completed_successfully
        required: false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      # Bind mount for local development (hot reload without rebuilding the image).
      # vendor/ is intentionally shared with the host — composer require on the host
      # propagates immediately, and the entrypoint runs `composer install` whenever
      # composer.lock drifts from vendor/composer/installed.json (e.g. after a fresh
      # clone or git pull). The other anonymous volumes mask host artefacts that
      # would otherwise shadow the image-built ones.
      - ../..:/app
      - /app/node_modules
      - /app/public/build
      - /app/bootstrap/cache   # cache without dev-only providers (no Pail)
    environment:
      ARGOS_ROLE:               "app"
      APP_ENV:                  "${APP_ENV:-local}"
      APP_DEBUG:                "${APP_DEBUG:-true}"
      APP_KEY:                  "${APP_KEY:-}"
      ARGOS_WORKER_IMAGE:       "${ARGOS_WORKER_IMAGE:-argos-worker:latest}"
      ARGOS_CONFIG_DIR:         /data/config
      DB_CONNECTION:            "mariadb"
      ARGOS_DB_HOST:            "db"
      ARGOS_DB_PORT:            "3306"
      ARGOS_DB_DATABASE:        "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:        "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:        "${ARGOS_DB_PASSWORD:-argos}"
    healthcheck:
      # Goes green only when DB is reachable AND the schema is fully migrated,
      # so dependents like `queue` can rely on `service_healthy` to mean
      # "schema is ready".
      test: ["CMD-SHELL", "php /app/artisan migrate:status >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${ARGOS_PORT:-8080}:80"
    volumes:
      # Read-only bind mount: nginx only needs /app/public for static files and
      # the Vite build output. The app service owns writes.
      - ../..:/app:ro
      - ./app/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  queue:
    # Reuses the image built/pulled by the `app` service — same Dockerfile
    # target, same content. Defining only `image:` (no `build:`) prevents
    # compose from inventing a separate `argos-queue` image that could drift.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      - ../..:/app
      - /app/node_modules
      - /app/public/build
      - /app/bootstrap/cache
    environment:
      ARGOS_ROLE:               "queue"
      APP_ENV:                  "${APP_ENV:-local}"
      APP_DEBUG:                "${APP_DEBUG:-true}"
      APP_KEY:                  "${APP_KEY:-}"
      ARGOS_WORKER_IMAGE:       "${ARGOS_WORKER_IMAGE:-argos-worker:latest}"
      ARGOS_CONFIG_DIR:         /data/config
      DB_CONNECTION:            "mariadb"
      ARGOS_DB_HOST:            "db"
      ARGOS_DB_PORT:            "3306"
      ARGOS_DB_DATABASE:        "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:        "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:        "${ARGOS_DB_PASSWORD:-argos}"
    command: ["php", "/app/artisan", "queue:work", "database", "--sleep=3", "--tries=3", "--max-time=3600"]

  # Local worker images mirror the CI matrix: one per supported PHP version.
  # Tag scheme is symmetric with stage/prod:
  #   local: argos-worker:local-php8.3 / :local-php8.4
  #   stage: ghcr.io/.../argos-worker:stage-php8.3 / :stage-php8.4
  #   prod:  ghcr.io/.../argos-worker:php8.3 / :php8.4
  # Workers are not started by compose; the app service spawns them via `docker run`.
  # `docker compose --profile build-only build` builds both variants at once.
  worker-php83:
    image: argos-worker:local-php8.3
    build:
      context: ../..
      dockerfile: .tools/docker/worker/Dockerfile
      target: worker
    profiles:
      - build-only
    volumes:
      - composer_cache:/home/agent/.composer/cache
      - npm_cache:/home/agent/.npm

  worker-php84:
    image: argos-worker:local-php8.4
    build:
      context: ../..
      dockerfile: .tools/docker/worker/Dockerfile
      target: worker-php84
    profiles:
      - build-only
    volumes:
      - composer_cache:/home/agent/.composer/cache
      - npm_cache:/home/agent/.npm

volumes:
  argos-data:
  argos-db:
  composer_cache:
  npm_cache:
