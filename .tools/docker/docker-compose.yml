# Argos — Docker Compose stack
#
# Services:
#   db        — MariaDB 11
#   redis     — Redis 7 (queue backend for Horizon)
#   app       — Laravel app (PHP-FPM), runs migrations on boot, spawns worker containers via the docker socket
#   nginx     — reverse proxy in front of app:9000
#   queue     — Laravel Horizon (same image as app, ARGOS_ROLE=queue)
#   scheduler — Laravel scheduler (`schedule:work`, ARGOS_ROLE=scheduler)
#
# Image source:
#   By default the `app`/`queue` services build `argos-app:local` from the local
#   sources. Set ARGOS_APP_IMAGE to a registry tag (e.g.
#   `ghcr.io/nodus-it/argos-app:stage`) and run `docker compose pull` to use a
#   prebuilt image instead.
#
# Worker images:
#   Worker images are built on demand by the WorkerImageResolver from
#   .tools/docker/worker/Dockerfile + the active worker_stack row, with tags
#   like `argos-worker:php-8.4-<stack-hash>-<agent>-<version>`. Nothing in
#   this compose file pre-builds them — the first phase run triggers the
#   build (1–3 min cold cache, instant after).

name: argos

services:

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE:      "${ARGOS_DB_DATABASE:-argos}"
      MARIADB_USER:          "${ARGOS_DB_USERNAME:-argos}"
      MARIADB_PASSWORD:      "${ARGOS_DB_PASSWORD:-argos}"
      MARIADB_ROOT_PASSWORD: "${ARGOS_DB_ROOT_PASSWORD:-argos-root}"
    volumes:
      - argos-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - argos-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    # Default to the locally built image. Override ARGOS_APP_IMAGE to pull a
    # tagged registry build instead (e.g. `ghcr.io/nodus-it/argos-app:stage`)
    # — `docker compose pull` will fetch it; `docker compose build` would
    # rebuild from source and re-tag.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    build:
      context: ../..
      dockerfile: .tools/docker/app/Dockerfile
      target: app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      # Bind mount for local development (hot reload without rebuilding the image).
      # vendor/ is intentionally shared with the host — composer require on the host
      # propagates immediately, and the entrypoint runs `composer install` whenever
      # composer.lock drifts from vendor/composer/installed.json (e.g. after a fresh
      # clone or git pull). The other anonymous volumes mask host artefacts that
      # would otherwise shadow the image-built ones.
      - ../..:/app
      - /app/node_modules
      - /app/public/build
      - /app/bootstrap/cache   # cache without dev-only providers (no Pail)
    environment:
      ARGOS_ROLE:                        "app"
      APP_ENV:                           "${APP_ENV:-local}"
      APP_DEBUG:                         "${APP_DEBUG:-true}"
      APP_KEY:                           "${APP_KEY:-}"
      ARGOS_CONFIG_DIR:                  /data/config
      PASSPORT_KEYS_PATH:                /data/passport
      DB_CONNECTION:                     "mariadb"
      ARGOS_DB_HOST:                     "db"
      ARGOS_DB_PORT:                     "3306"
      ARGOS_DB_DATABASE:                 "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:                 "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:                 "${ARGOS_DB_PASSWORD:-argos}"
      QUEUE_CONNECTION:                  "redis"
      REDIS_HOST:                        "redis"
      REDIS_PORT:                        "6379"
      ARGOS_QUEUE_DEFAULT_PROCESSES:     "${ARGOS_QUEUE_DEFAULT_PROCESSES:-5}"
      ARGOS_QUEUE_TASKS_PROCESSES:       "${ARGOS_QUEUE_TASKS_PROCESSES:-2}"
    healthcheck:
      # Goes green only when DB is reachable AND the schema is fully migrated,
      # so dependents like `queue` can rely on `service_healthy` to mean
      # "schema is ready".
      test: ["CMD-SHELL", "php /app/artisan migrate:status >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  # Traefik is the single port-80 entry. It routes by Host: demo containers
  # (started by the manager with `Host(demo-…)` labels on the argos_edge
  # network) win; everything else falls through to nginx (the Argos app), so
  # http://localhost:${ARGOS_PORT} keeps working locally.
  traefik:
    image: traefik:v3.1
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=argos_edge"
      - "--entrypoints.web.address=:80"
    ports:
      - "${ARGOS_PORT:-8080}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - default
      - argos_edge
    depends_on:
      - nginx

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - default
      - argos_edge
    labels:
      # Catch-all fallback (priority 1) — any Host not matched by a demo router
      # (which carry higher-priority Host rules) lands on the Argos app.
      - "traefik.enable=true"
      - "traefik.docker.network=argos_edge"
      - "traefik.http.routers.argos.rule=PathPrefix(`/`)"
      - "traefik.http.routers.argos.priority=1"
      - "traefik.http.routers.argos.entrypoints=web"
      - "traefik.http.services.argos.loadbalancer.server.port=80"
    volumes:
      # Read-only bind mount: nginx only needs /app/public for static files and
      # the Vite build output. The app service owns writes.
      - ../..:/app:ro
      - ./app/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # phpMyAdmin on port 8081 (override via ARGOS_PMA_PORT) — always on.
  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ARGOS_PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_USER: "${ARGOS_DB_USERNAME:-argos}"
      PMA_PASSWORD: "${ARGOS_DB_PASSWORD:-argos}"
      UPLOAD_LIMIT: 256M

  queue:
    # Reuses the image built/pulled by the `app` service — same Dockerfile
    # target, same content. Defining only `image:` (no `build:`) prevents
    # compose from inventing a separate `argos-queue` image that could drift.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 60s
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      - ../..:/app
      - /app/node_modules
      - /app/public/build
      - /app/bootstrap/cache
    environment:
      ARGOS_ROLE:                        "queue"
      APP_ENV:                           "${APP_ENV:-local}"
      APP_DEBUG:                         "${APP_DEBUG:-true}"
      APP_KEY:                           "${APP_KEY:-}"
      ARGOS_CONFIG_DIR:                  /data/config
      PASSPORT_KEYS_PATH:                /data/passport
      DB_CONNECTION:                     "mariadb"
      ARGOS_DB_HOST:                     "db"
      ARGOS_DB_PORT:                     "3306"
      ARGOS_DB_DATABASE:                 "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:                 "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:                 "${ARGOS_DB_PASSWORD:-argos}"
      QUEUE_CONNECTION:                  "redis"
      REDIS_HOST:                        "redis"
      REDIS_PORT:                        "6379"
      ARGOS_QUEUE_DEFAULT_PROCESSES:     "${ARGOS_QUEUE_DEFAULT_PROCESSES:-5}"
      ARGOS_QUEUE_TASKS_PROCESSES:       "${ARGOS_QUEUE_TASKS_PROCESSES:-2}"
    command: ["php", "/app/artisan", "horizon"]

  scheduler:
    # Same image as app/queue. Runs `schedule:work`, which invokes
    # `schedule:run` every minute (see routes/console.php — e.g.
    # argos:poll-issues every 5 min). No docker socket: scheduled commands
    # only dispatch queued jobs, the `queue` worker does the actual work.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - argos-data:/data
      - ../..:/app
      - /app/node_modules
      - /app/public/build
      - /app/bootstrap/cache
    environment:
      ARGOS_ROLE:               "scheduler"
      APP_ENV:                  "${APP_ENV:-local}"
      APP_DEBUG:                "${APP_DEBUG:-true}"
      APP_KEY:                  "${APP_KEY:-}"
      ARGOS_CONFIG_DIR:         /data/config
      PASSPORT_KEYS_PATH:       /data/passport
      DB_CONNECTION:            "mariadb"
      ARGOS_DB_HOST:            "db"
      ARGOS_DB_PORT:            "3306"
      ARGOS_DB_DATABASE:        "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:        "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:        "${ARGOS_DB_PASSWORD:-argos}"
    command: ["php", "/app/artisan", "schedule:work"]

networks:
  # Shared edge network: Traefik + nginx + the manager-started demo containers.
  # Named explicitly so the per-demo compose override can join it as external.
  argos_edge:
    name: argos_edge

volumes:
  argos-data:
  argos-db:
  argos-redis:
  composer_cache:
  npm_cache:
