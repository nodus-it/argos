# Argos — canonical Docker Compose stack
#
# This is the SINGLE source of truth for the stack, used both by the self-host
# installer (downloaded into the install directory by `.tools/install.sh` and
# considered SYSTEM-MANAGED — the installer overwrites it on update) and by
# local development (layered with docker-compose.dev.yml, see below).
#
# Services:
#   db        — MariaDB 11
#   redis     — Redis 7 (queue backend for Horizon)
#   app       — Laravel app (PHP-FPM); runs migrations on boot, spawns worker
#               containers via the docker socket, seeds Traefik + nginx config
#   traefik   — single port-80 entry; file-provider routing (app + live demos)
#   nginx     — serves static assets + proxies to app:9000, behind Traefik
#   queue     — Laravel Horizon (same image as app, ARGOS_ROLE=queue)
#   scheduler — Laravel scheduler (`schedule:work`, ARGOS_ROLE=scheduler)
#
# Production vs. development:
#   Production pulls a prebuilt image (ARGOS_APP_IMAGE points at a registry tag,
#   set in .env). Local development layers docker-compose.dev.yml on top, which
#   adds the `build:` block, source bind mounts (hot reload) and phpMyAdmin:
#     docker compose -f .tools/docker/docker-compose.yml \
#                    -f .tools/docker/docker-compose.dev.yml up
#   The `.tools/bin/dev-*.sh` scripts and the `composer dev` script do this.
#
# Customisation (production): drop a `docker-compose.override.yml` next to this
# file — compose merges it automatically and the installer never touches it.
#
# All tunables live in `.env` (see .env.example for the full list with
# defaults). Keys are read by compose via `${VAR:-default}` substitution.
#
# Worker images are built on demand by the WorkerImageResolver from
# .tools/docker/worker/Dockerfile + the active worker_stack row — nothing here
# pre-builds them; the first phase run triggers the build.

name: argos

# OAuth client credentials are read by both the app (Connect flow) and the
# queue worker (TokenRefresher during phase runs). Defined once, merged into
# both services' environment via the YAML anchor below.
x-oauth-env: &oauth-env
  GITHUB_CLIENT_ID:        "${GITHUB_CLIENT_ID:-}"
  GITHUB_CLIENT_SECRET:    "${GITHUB_CLIENT_SECRET:-}"
  GITLAB_CLIENT_ID:        "${GITLAB_CLIENT_ID:-}"
  GITLAB_CLIENT_SECRET:    "${GITLAB_CLIENT_SECRET:-}"
  GITLAB_INSTANCE_URL:     "${GITLAB_INSTANCE_URL:-}"
  BITBUCKET_CLIENT_ID:     "${BITBUCKET_CLIENT_ID:-}"
  BITBUCKET_CLIENT_SECRET: "${BITBUCKET_CLIENT_SECRET:-}"

# Live-Demo (P6) preview settings — shared verbatim by app + queue (the queue
# worker runs DeployDemoJob, the app warms the runtime image). Listed via an
# anchor so the two stay in lockstep. All gated behind ARGOS_PREVIEW_ENABLED
# (default off); see config/argos.php.
x-preview-env: &preview-env
  ARGOS_PREVIEW_ENABLED:        "${ARGOS_PREVIEW_ENABLED:-false}"
  ARGOS_PREVIEW_BASE_DOMAIN:    "${ARGOS_PREVIEW_BASE_DOMAIN:-127.0.0.1.nip.io}"
  ARGOS_PREVIEW_SCHEME:         "${ARGOS_PREVIEW_SCHEME:-http}"
  ARGOS_PORT:                   "${ARGOS_PORT:-8080}"
  # Public port the demo URL is reached on (omitted from the URL for 80/443).
  # Defaults to ARGOS_PORT; set to 443 behind an upstream TLS proxy.
  ARGOS_PREVIEW_PORT:           "${ARGOS_PREVIEW_PORT:-${ARGOS_PORT:-8080}}"
  ARGOS_PREVIEW_TTL_HOURS:      "${ARGOS_PREVIEW_TTL_HOURS:-24}"
  ARGOS_PREVIEW_NETWORK:        "${ARGOS_PREVIEW_NETWORK:-argos_edge}"
  ARGOS_PREVIEW_MAX_CONCURRENT: "${ARGOS_PREVIEW_MAX_CONCURRENT:-10}"
  ARGOS_PREVIEW_CPU_LIMIT:      "${ARGOS_PREVIEW_CPU_LIMIT:-1.0}"
  ARGOS_PREVIEW_MEM_LIMIT:      "${ARGOS_PREVIEW_MEM_LIMIT:-1g}"
  ARGOS_PREVIEW_DEFAULT_IMAGE:  "${ARGOS_PREVIEW_DEFAULT_IMAGE:-argos-demo}"

services:

  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE:      "${ARGOS_DB_DATABASE:-argos}"
      MARIADB_USER:          "${ARGOS_DB_USERNAME:-argos}"
      MARIADB_PASSWORD:      "${ARGOS_DB_PASSWORD:-argos}"
      MARIADB_ROOT_PASSWORD: "${ARGOS_DB_ROOT_PASSWORD:-argos-root}"
    volumes:
      - argos-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - argos-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    # Production pulls the tag in ARGOS_APP_IMAGE; local dev (docker-compose.dev.yml)
    # adds a build block and builds argos-app:local from source.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Spawning worker containers needs the host's docker socket.
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent app state (config, app-key, passport keys).
      - argos-data:/data
      # Traefik dynamic-config dir (file provider). The app seeds the static
      # Argos route here on boot; the manager writes one file per live demo.
      - argos-traefik:/data/traefik
      # Shared with nginx — the entrypoint syncs /app/public + the baked
      # nginx.conf into these on every boot so nginx serves assets and site
      # config without bind-mounts in the host install dir.
      - argos-public:/srv/argos-public
      - argos-nginx-config:/srv/argos-nginx
    environment:
      <<: [*oauth-env, *preview-env]
      ARGOS_ROLE:                        "app"
      APP_ENV:                           "${APP_ENV:-production}"
      APP_DEBUG:                         "${APP_DEBUG:-false}"
      APP_URL:                           "${APP_URL:-http://localhost:${ARGOS_PORT:-8080}}"
      APP_KEY:                           "${APP_KEY:-}"
      ADMIN_PASSWORD:                    "${ADMIN_PASSWORD:-}"
      CLAUDE_CODE_OAUTH_TOKEN:           "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_CONFIG_DIR:                  /data/config
      ARGOS_TRAEFIK_DIR:                 /data/traefik
      DB_CONNECTION:                     "mariadb"
      ARGOS_DB_HOST:                     "db"
      ARGOS_DB_PORT:                     "3306"
      ARGOS_DB_DATABASE:                 "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:                 "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:                 "${ARGOS_DB_PASSWORD:-argos}"
      QUEUE_CONNECTION:                  "redis"
      REDIS_HOST:                        "redis"
      REDIS_PORT:                        "6379"
      ARGOS_QUEUE_DEFAULT_PROCESSES:     "${ARGOS_QUEUE_DEFAULT_PROCESSES:-5}"
      ARGOS_QUEUE_TASKS_PROCESSES:       "${ARGOS_QUEUE_TASKS_PROCESSES:-2}"
    healthcheck:
      # Goes green only when DB is reachable AND the schema is fully migrated,
      # so dependents (queue, nginx) can rely on `service_healthy`.
      test: ["CMD-SHELL", "php /app/artisan migrate:status >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  # Traefik is the single port-80 entry, configured via the FILE provider
  # (not the docker provider — Traefik pins Docker API 1.24, which Engine 29's
  # daemon, min API 1.40, rejects). Routes live as YAML in a shared volume:
  # the app seeds the catch-all Argos route; the manager writes one file per
  # demo (Host(demo-…) → demo container). Higher-priority demo Host rules win;
  # everything else falls through to nginx, so http://localhost:${ARGOS_PORT}
  # keeps working.
  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    command:
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      # Trust + pass through X-Forwarded-* from an upstream TLS-terminating
      # proxy (HAProxy/nginx/Caddy/another Traefik). Without this Traefik
      # overwrites X-Forwarded-Proto with "http" for the :80 entrypoint, so
      # Laravel (which trusts the proto header, see bootstrap/app.php) sees
      # plain HTTP and emits http:// asset URLs → mixed-content blocked on an
      # HTTPS site. Mirrors Laravel's trustProxies(at: '*') posture.
      - "--entrypoints.web.forwardedHeaders.insecure=true"
    ports:
      - "${ARGOS_PORT:-8080}:80"
    volumes:
      - argos-traefik:/etc/traefik/dynamic:ro
    networks:
      - default
      - argos_edge
    depends_on:
      - nginx

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    networks:
      - default
      - argos_edge
    volumes:
      # Both volumes are populated by the app container's entrypoint on every
      # boot. Mounted RO here so nginx serves static assets directly without
      # bouncing through PHP-FPM, and picks up the baked site config.
      - argos-public:/app/public:ro
      - argos-nginx-config:/etc/nginx/conf.d:ro

  queue:
    # Reuses the image built/pulled by the `app` service — same Dockerfile
    # target, same content.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    restart: unless-stopped
    stop_signal: SIGTERM
    stop_grace_period: 60s
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      - argos-traefik:/data/traefik
    environment:
      <<: [*oauth-env, *preview-env]
      ARGOS_ROLE:                        "queue"
      APP_ENV:                           "${APP_ENV:-production}"
      APP_DEBUG:                         "${APP_DEBUG:-false}"
      APP_URL:                           "${APP_URL:-http://localhost:${ARGOS_PORT:-8080}}"
      APP_KEY:                           "${APP_KEY:-}"
      CLAUDE_CODE_OAUTH_TOKEN:           "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_CONFIG_DIR:                  /data/config
      ARGOS_TRAEFIK_DIR:                 /data/traefik
      DB_CONNECTION:                     "mariadb"
      ARGOS_DB_HOST:                     "db"
      ARGOS_DB_PORT:                     "3306"
      ARGOS_DB_DATABASE:                 "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:                 "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:                 "${ARGOS_DB_PASSWORD:-argos}"
      QUEUE_CONNECTION:                  "redis"
      REDIS_HOST:                        "redis"
      REDIS_PORT:                        "6379"
      ARGOS_QUEUE_DEFAULT_PROCESSES:     "${ARGOS_QUEUE_DEFAULT_PROCESSES:-5}"
      ARGOS_QUEUE_TASKS_PROCESSES:       "${ARGOS_QUEUE_TASKS_PROCESSES:-2}"
    command: ["php", "/app/artisan", "horizon"]

  scheduler:
    # Runs `schedule:work`, which invokes `schedule:run` every minute (see
    # routes/console.php — e.g. argos:poll-issues every 5 min). No docker
    # socket: scheduled commands only dispatch queued jobs, the `queue`
    # worker does the actual work.
    image: "${ARGOS_APP_IMAGE:-argos-app:local}"
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - argos-data:/data
    environment:
      <<: *oauth-env
      ARGOS_ROLE:               "scheduler"
      APP_ENV:                  "${APP_ENV:-production}"
      APP_DEBUG:                "${APP_DEBUG:-false}"
      APP_URL:                  "${APP_URL:-http://localhost:${ARGOS_PORT:-8080}}"
      APP_KEY:                  "${APP_KEY:-}"
      CLAUDE_CODE_OAUTH_TOKEN:  "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_CONFIG_DIR:         /data/config
      DB_CONNECTION:            "mariadb"
      ARGOS_DB_HOST:            "db"
      ARGOS_DB_PORT:            "3306"
      ARGOS_DB_DATABASE:        "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:        "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:        "${ARGOS_DB_PASSWORD:-argos}"
      QUEUE_CONNECTION:         "redis"
      REDIS_HOST:               "redis"
      REDIS_PORT:               "6379"
    command: ["php", "/app/artisan", "schedule:work"]

networks:
  # Shared edge network: Traefik + nginx + the manager-started demo containers.
  # Named explicitly so the per-demo compose override can join it as external.
  argos_edge:
    name: argos_edge

volumes:
  argos-data:
  argos-db:
  argos-redis:
  # Traefik dynamic config (file provider): written rw by app/queue, mounted
  # ro by traefik. Holds the static Argos route + one file per live demo.
  argos-traefik:
  # nginx-served assets + site config, populated by the app entrypoint.
  argos-public:
  argos-nginx-config:
