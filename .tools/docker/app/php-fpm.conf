[global]
error_log = /dev/stderr

[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000

pm                   = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4

; Pass environment variables through to PHP
clear_env = no

; HOME for www-data so the docker CLI (invoked from PhaseRunner) finds its
; config under /var/www/.docker instead of root's home.
env[HOME] = /var/www

php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors]  = on
