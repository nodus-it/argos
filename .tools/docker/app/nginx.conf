server {
    listen 80;
    root /app/public;
    index index.php;

    client_max_body_size 64M;

    # Resolve the `app` upstream at request time via Docker's embedded DNS
    # (127.0.0.11) instead of once at config load. A literal `fastcgi_pass
    # app:9000` makes nginx abort with "host not found in upstream" whenever
    # the app container is briefly absent — e.g. during a partial recreate
    # that rebuilds the compose network but leaves this nginx on the stale
    # one. The variable defers resolution and re-checks every 10s, so nginx
    # stays up and follows the app container across network changes.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_app app:9000;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        # In the split compose stack, PHP-FPM lives in the `app` service.
        fastcgi_pass $upstream_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_read_timeout 300;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    access_log /dev/stdout;
    error_log  /dev/stderr warn;
}
