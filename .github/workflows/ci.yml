name: CI

on:
  push:
    branches: [develop]
    # SemVer-style tags without v-prefix (e.g. 0.2.0, 0.2.0-beta.1).
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck (severity=warning)
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable \
            --severity=warning \
            .tools/docker/worker/worker-entrypoint.sh \
            worker/tests/run-tests.sh \
            worker/tests/run-bats.sh \
            worker/lib/*.sh \
            worker/phases/*.sh \
            .tools/install.sh \
            .tools/tests/run-bats.sh \
            .tools/bin/dev-reload.sh \
            .tools/bin/dev-reset.sh \
            .claude/scripts/boost-freshness-check.sh \
            .claude/scripts/retro-reminder.sh

  worker-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: bats unit tests (via Docker, includes jq + check-jsonschema)
        run: bash worker/tests/run-bats.sh

  installer-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: bats unit tests for install.sh (via Docker)
        run: bash .tools/tests/run-bats.sh

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan tracked files for live API tokens
        # Patterns cover only the four token classes we actually carry
        # (Anthropic OAuth, GitHub PAT, GitHub OAuth, GitLab PAT). Test
        # fixtures under worker/tests/ are allow-listed because some specs
        # exercise scrubbing/logging by feeding fake tokens through helpers.
        run: |
          PATTERN='sk-ant-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|glpat-[A-Za-z0-9_-]{20,}'
          if git grep --line-number -E "$PATTERN" -- ':!worker/tests/'; then
            echo
            echo "::error::Live token pattern matched in a tracked file. Rotate the token immediately and rewrite history if needed."
            exit 1
          fi
          echo "Secret scan clean."

  app-quality:
    runs-on: ubuntu-latest
    # Tests run against MariaDB (matching production) so DB-only constraints
    # like ENUM columns are exercised — see retro wave-1 C11 for context.
    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_DATABASE: argos
          MARIADB_USER: argos
          MARIADB_PASSWORD: argos
          MARIADB_ROOT_PASSWORD: argos-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DB_CONNECTION: mariadb
      ARGOS_DB_HOST: 127.0.0.1
      ARGOS_DB_PORT: '3306'
      ARGOS_DB_DATABASE: argos
      ARGOS_DB_USERNAME: argos
      ARGOS_DB_PASSWORD: argos
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo_mysql
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Pint (code style)
        run: vendor/bin/pint --test --format agent

      - name: PHPStan / Larastan (level 2 via baseline)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

      - name: PHPUnit (feature + unit)
        run: php artisan test --compact

  docker-images:
    # build-app (below) only builds on develop/tags and pushes — so on a PR the
    # Dockerfiles were never exercised. Validate them here on every PR (no push):
    #   - app image: Dockerfile + the Vite frontend build baked into it
    #   - worker image: the two-stage build the WorkerImageResolver does at
    #     runtime (stack php-8.4 → Dockerfile.compose + the claude-code agent)
    # Plain `docker build` (not buildx) so the compose stage sees the locally
    # built stack image as its FROM.
    needs: [shellcheck, app-quality]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build app image (target app, no push)
        run: docker build -t argos-app:ci -f .tools/docker/app/Dockerfile --target app .

      - name: Build worker stack image (php-8.4)
        run: docker build -t argos-stack:php-8.4 -f .tools/docker/worker/stacks/Dockerfile.php-8.4 .

      - name: Build final worker image (stack + claude-code agent)
        run: |
          docker build \
            --build-arg STACK_IMAGE=argos-stack:php-8.4 \
            --build-arg AGENT_INSTALL_SCRIPT=.tools/docker/worker/agents/install-claude-code.sh \
            -f .tools/docker/worker/Dockerfile.compose \
            -t argos-worker:ci .

  browser-e2e:
    # Gemockt Playwright suite against an ephemeral fake-mode stack. This was
    # "deliberately not built" while the only stack was the developer's live one
    # (the suite runs migrate:fresh) — on a throwaway runner that risk is gone.
    needs: [app-quality]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build app image (used by app/queue/nginx/scheduler)
        run: docker build -t argos-app:local -f .tools/docker/app/Dockerfile --target app .

      - name: Write the fake-mode stack env
        # APP_ENV=local + ARGOS_E2E_FAKE=1 boots E2eFakeServiceProvider; the
        # APP_KEY is the throwaway test key from phpunit.xml. ADMIN_PASSWORD
        # matches the seeded login the specs use (admin@argos.local / 12345).
        run: |
          cat > .env <<'EOF'
          APP_ENV=local
          APP_DEBUG=true
          APP_KEY=base64:zTobRxr7TepBXVjM/E3kjKGAwnxWQ7QWMMXaInQYKKg=
          APP_URL=http://localhost:8080
          ARGOS_PORT=8080
          ADMIN_PASSWORD=12345
          ARGOS_E2E_FAKE=1
          EOF

      - name: Bring up the stack (db, redis, app, queue, nginx, traefik)
        run: |
          docker compose --env-file .env -f .tools/docker/docker-compose.yml \
            up -d --wait db redis app queue nginx traefik

      - name: Seed the full demo profile
        run: |
          docker compose --env-file .env -f .tools/docker/docker-compose.yml \
            exec -T app php artisan db:seed --class='Database\Seeders\FullDemoSeeder' --force

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npx playwright install --with-deps chromium

      - name: Run the gemockt browser-E2E suite
        # full-flow.real self-skips unless ARGOS_E2E_REAL=1, so a plain run
        # covers exactly the deterministic fake specs.
        run: npx playwright test

      - name: Dump container logs on failure
        if: failure()
        run: |
          docker compose --env-file .env -f .tools/docker/docker-compose.yml \
            logs --tail=200 app queue

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build-app:
    needs: [shellcheck, worker-unit, app-quality, installer-unit, secret-scan]
    # The metadata-action only emits tags for develop and release tags;
    # on a feature branch (push or workflow_dispatch) the tag list is
    # empty and `docker buildx push` errors with "tag is needed when
    # pushing to registry". Limit the job accordingly.
    if: |
      github.event_name != 'pull_request' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (app)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/argos-app
          # Pre-releases (0.2.0-beta.1) currently also get :latest because we are
          # not live yet — a single floating tag for testers is more useful than
          # the strict "latest = stable only" rule. Tighten this once we cut a
          # real stable: drop :latest from prereleases by gating on
          # `!contains(github.ref, '-')`.
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=stage,enable=${{ github.ref == 'refs/heads/develop' }}

      - name: Compute version build-arg
        id: ver
        run: |
          # Only :stage (develop) images get a build-time version stamp; on
          # release tags we leave it empty so the sed-bumped $argosVersion
          # literal in config/argos.php is used instead.
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "value=stage-$(date -u +%Y-%m-%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: .tools/docker/app/Dockerfile
          target: app
          push: true
          build-args: |
            ARGOS_VERSION=${{ steps.ver.outputs.value }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
