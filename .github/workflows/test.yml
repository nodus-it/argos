name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (severity=warning)
        run: |
          docker run --rm -v "$PWD:/mnt" -w /mnt koalaman/shellcheck:stable \
            --severity=warning \
            agent \
            docker/worker-entrypoint.sh \
            tests/run-tests.sh \
            tests/run-bats.sh \
            lib/*.sh \
            phases/*.sh \
            tests/integration/*.sh \
            tests/integration/fixtures/mock-claude/claude \
            tests/integration/fixtures/fake-remote-repo/setup.sh

  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bats unit tests (via Docker, includes jq + check-jsonschema)
        run: bash tests/run-bats.sh

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build worker image
        run: docker compose build worker
      - name: integration: phase lifecycle
        run: bash tests/run-tests.sh --integration
