name: "🐛 Bug report"
description: Report a defect or unexpected behaviour in Argos
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

        Please fill out the sections below so we can reproduce and fix the issue quickly.
        **Do not paste secrets** (tokens, API keys, `.env` contents) — redact them before submitting.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: e.g. The "implement" phase crashes immediately when the worker container starts.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. The worker should run the implement phase and push a branch.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we trigger the bug? Include task config, repo profile settings, or relevant UI clicks.
      placeholder: |
        1. Create a task targeting repo X with worker image `argos-worker:local-php8.4`
        2. Click "Run concept"
        3. ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Argos version
      description: Visible in the footer of every page, or run `php artisan config:show argos.version`.
      placeholder: e.g. 0.1.0-beta.1
    validations:
      required: true

  - type: input
    id: worker_image
    attributes:
      label: Worker image
      description: The worker image tag the task uses (Settings → Worker image, or the task / repo profile).
      placeholder: e.g. argos-worker:local-php8.4

  - type: markdown
    attributes:
      value: |
        ### 📎 Please attach logs

        Argos can export the relevant log files for you — please download them
        from the UI and **drag-and-drop them onto this issue** before submitting:

        - **App log** (manager / queue): *Settings → Download log*
        - **Phase logs** (worker per phase): open the affected task → *Logs Download* button (top right) → *Log herunterladen*

        Redact tokens or secrets if any slipped into the logs.

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, anything else that might be relevant.
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Firefox 134
        - Docker: 27.3.1
