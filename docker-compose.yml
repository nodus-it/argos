# Argos — Docker Compose (lokale Entwicklung)
#
# Zwei Images:
#   manager  — Laravel-App, Web-UI, Queue-Worker, MariaDB (all-in-one)
#   worker   — Claude Code, Phasen-Runner (wird per `docker run` vom Manager gestartet)
#
# Der worker-Service hier dient nur zum lokalen Image-Build.
# PhaseRunner startet Worker-Container direkt via `docker run`, nicht via compose.
#
# Profile:
#   (kein Profile)  — nur Manager (inkl. integrierter MariaDB)
#   build-only      — nur zum Bauen des Worker-Images

services:

  manager:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: manager
    ports:
      - "${ARGOS_PORT:-8080}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      - argos-db:/var/lib/mysql
      # Bind-Mount für lokale Entwicklung (hot-reload ohne Image-Rebuild)
      - .:/app
      - /app/vendor            # vendor aus Image nutzen, nicht vom Host überschreiben
      - /app/node_modules      # dto.
      - /app/public/build      # dto.
      - /app/bootstrap/cache   # dto. — cache ohne dev-only providers (kein Pail)
    environment:
      APP_ENV:                  "${APP_ENV:-local}"
      APP_DEBUG:                "${APP_DEBUG:-true}"
      APP_KEY:                  "${APP_KEY:?APP_KEY must be set}"
      CLAUDE_CODE_OAUTH_TOKEN:  "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_WORKER_IMAGE:       "${ARGOS_WORKER_IMAGE:-argos-worker:latest}"
      ARGOS_CONFIG_DIR:         /data/config
      DB_CONNECTION:            "mariadb"
      QUEUE_CONNECTION:         database
      SESSION_DRIVER:           database
      CACHE_STORE:              database
      # MariaDB läuft im selben Container — Verbindung via Unix-Socket
      ARGOS_DB_HOST:            "127.0.0.1"
      ARGOS_DB_PORT:            "3306"
      ARGOS_DB_SOCKET:          "/run/mysqld/mysqld.sock"
      ARGOS_DB_DATABASE:        "${ARGOS_DB_DATABASE:-argos}"
      ARGOS_DB_USERNAME:        "${ARGOS_DB_USERNAME:-argos}"
      ARGOS_DB_PASSWORD:        "${ARGOS_DB_PASSWORD:-argos}"

  worker:
    image: argos-worker:latest
    build:
      context: ./worker
      dockerfile: docker/Dockerfile
      target: worker
    # Kein Start via compose — wird per `docker run` vom Manager gestartet.
    # Dieser Service existiert nur damit `docker compose build worker` funktioniert.
    profiles:
      - build-only
    volumes:
      - composer_cache:/home/agent/.composer/cache
      - npm_cache:/home/agent/.npm

volumes:
  argos-data:
  argos-db:
  composer_cache:
  npm_cache:
