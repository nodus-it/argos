# Argos — Docker Compose (lokale Entwicklung)
#
# Zwei Images:
#   manager  — Laravel-App, Web-UI, Queue-Worker, Docker-Socket für Worker-Spawn
#   worker   — Claude Code, Phasen-Runner (wird per `docker run` vom Manager gestartet)
#
# Der worker-Service hier dient nur zum lokalen Image-Build.
# PhaseRunner startet Worker-Container direkt via `docker run`, nicht via compose.

services:

  manager:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: manager
    ports:
      - "${ARGOS_PORT:-8080}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - argos-data:/data
      # Bind-Mount für lokale Entwicklung (hot-reload ohne Image-Rebuild)
      - .:/app
      - /app/vendor        # vendor aus Image nutzen, nicht vom Host überschreiben
      - /app/node_modules  # dto.
      - /app/public/build  # dto.
    environment:
      APP_ENV:                  "${APP_ENV:-local}"
      APP_DEBUG:                "${APP_DEBUG:-true}"
      APP_KEY:                  "${APP_KEY:?APP_KEY must be set}"
      CLAUDE_CODE_OAUTH_TOKEN:  "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      ARGOS_WORKER_IMAGE:       "${ARGOS_WORKER_IMAGE:-argos-worker:latest}"
      ARGOS_CONFIG_DIR:         /data/config
      DB_CONNECTION:            "${DB_CONNECTION:-sqlite}"
      DB_DATABASE:              "${DB_DATABASE:-/data/argos.db}"
      QUEUE_CONNECTION:         database
      SESSION_DRIVER:           database
      CACHE_STORE:              database
    depends_on: []

  worker:
    image: argos-worker:latest
    build:
      context: ./worker
      dockerfile: docker/Dockerfile
      target: worker
    # Kein Start via compose — wird per `docker run` vom Manager gestartet.
    # Dieser Service existiert nur damit `docker compose build worker` funktioniert.
    profiles:
      - build-only
    volumes:
      - composer_cache:/home/agent/.composer/cache
      - npm_cache:/home/agent/.npm

volumes:
  argos-data:
  composer_cache:
  npm_cache:
