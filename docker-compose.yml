# Claude Worker — Docker Compose
#
# Run-and-exit Service. Wird von der `agent`-CLI mit `docker compose run --rm worker ...`
# aufgerufen. Pro Task wird zusätzlich ein dynamisches Volume `task_ws_<task-id>`
# via `-v` ans Run-Kommando angehängt — diese Volumes sind hier bewusst NICHT
# statisch deklariert, weil sie pro Task erzeugt/gelöscht werden.

services:
  worker:
    image: agent-worker:latest
    build:
      context: ./worker
      dockerfile: docker/Dockerfile
      target: worker
    volumes:
      - composer_cache:/home/agent/.composer/cache
      - npm_cache:/home/agent/.npm
    environment:
      PHASE: "${PHASE:-}"
      TASK_ID: "${TASK_ID:-}"
      REPO_URL: "${REPO_URL:-}"
      REPO_TOKEN: "${REPO_TOKEN:-}"
      BASE_BRANCH: "${BASE_BRANCH:-}"
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      PHASE_FLAGS: "${PHASE_FLAGS:-}"
      MAX_TURNS: "${MAX_TURNS:-}"
    deploy:
      resources:
        limits:
          memory: "${AGENT_MEM_LIMIT:-4g}"
          cpus: "${AGENT_CPU_LIMIT:-2}"

volumes:
  composer_cache:
  npm_cache:
